<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Island Adventure 🌴 - One Stroke Euler</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.21.1/cytoscape.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="assets-container" style="display:none;">
        <img id="island-1" src="island1.png">
        <img id="island-2" src="island2.png">
        <img id="island-3" src="island3.png">
        <img id="island-4" src="island4.png">
        <img id="island-5" src="island5.png">
        <img id="island-6" src="island6.png">
        <img id="boat-sprite" src="boat.png">
    </div>

    <audio id="bgm-audio" src="Adventure-320bit(chosic.com).mp3" loop></audio>
    <audio id="sfx-win" src="0090. Adventure - AShamaluevMusic.mp3"></audio>
    <audio id="sfx-hover" src=""></audio>
    <audio id="sfx-move" src=""></audio>
    <audio id="sfx-error" src=""></audio>

    <div id="game-sidebar">
        <div class="logo">🏝️ ĐẠI HẢI TRÌNH</div>
        
        <div class="panel">
            <div class="panel-title" style="display: flex; justify-content: space-between;">
                <span>MỤC TIÊU LEVEL <span id="level-display">1</span></span>
                <span id="level-type-badge" class="badge">EASY</span>
            </div>
            <div class="panel-content" style="min-height: 60px;">
                <div id="euler-type-info" style="color: #fde047; font-weight: 900; margin-bottom: 12px; font-size: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px;"></div>
                <div id="level-desc" style="color: #cbd5e1; font-size: 14px;">Đang nạp màn chơi...</div>
            </div>
            
            <div class="nav-buttons" style="margin-top: 15px; display: flex; gap: 5px;">
                <button class="btn btn-nav" onclick="prevLevel()"><i class="fas fa-chevron-left"></i></button>
                <button class="btn btn-nav" style="flex:1" onclick="generateRandomMap()"><i class="fas fa-dice"></i> Random</button>
                <button class="btn btn-nav" onclick="nextLevel()"><i class="fas fa-chevron-right"></i></button>
            </div>
        </div>

        <div class="panel">
            <div class="panel-title">TIẾN ĐỘ KHÁM PHÁ</div>
            <div class="stat-row">
                <span>Hải trình:</span>
                <span id="edge-progress" style="color: #00e5ff; font-weight: bold; font-size: 18px;">0 / 0</span>
            </div>
            <div class="stat-row">
                <span>Vị trí hiện tại:</span>
                <span id="current-island" style="color: #fde047; font-weight: bold;">Chưa nhổ neo</span>
            </div>
        </div>

        <button class="btn btn-hint" onclick="showHint()"><i class="fas fa-magic"></i> Gợi ý Lộ trình</button>
        <button class="btn btn-reset" onclick="resetLevel()"><i class="fas fa-redo-alt"></i> Chơi lại Level này</button>
        
        <div style="flex-grow: 1;"></div>
        <button class="btn btn-back" onclick="window.location.href='index.html'"><i class="fas fa-arrow-left"></i> Về Phần Mềm PTIT</button>
    </div>

    <div id="game-main">
        <canvas id="water-bg"></canvas>
        <canvas id="edges-canvas"></canvas>
        <div id="cy-game"></div>
        <canvas id="boat-canvas"></canvas>
        <canvas id="confetti-canvas" style="position: absolute; top:0; left:0; width:100%; height:100%; z-index: 100; pointer-events: none;"></canvas>
    </div>

    <div id="game-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content victory-bounce">
            <div class="modal-icon" id="modal-icon">🏆</div>
            <h2 id="modal-title" class="victory-text">Tiêu đề</h2>
            <p id="modal-desc">Nội dung chi tiết</p>
            <button id="modal-btn" class="btn btn-action" style="width: 100%; margin-top: 15px; font-size: 18px; padding: 15px;">Tiếp tục</button>
            <button id="modal-btn-alt" class="btn btn-reset" style="width: 100%; margin-top: 10px; display:none;">Chơi lại</button>
        </div>
    </div>

    <div id="start-overlay" class="modal-overlay" style="z-index: 2000;">
        <div class="modal-content" style="background: rgba(15, 23, 42, 0.95); border: 2px solid #00e5ff; box-shadow: 0 0 50px rgba(0, 229, 255, 0.6);">
            <div class="modal-icon" style="font-size: 90px; margin-bottom: 20px;">⛵</div>
            <h2 style="color: #00e5ff; font-size: 32px;">SẴN SÀNG RA KHƠI</h2>
            <p style="font-size: 18px;">Click vào màn hình để Bật hệ thống Nhạc Nền, Sóng Biển và nạp bản đồ!</p>
            <button class="btn btn-action" style="width: 100%; font-size: 20px; padding: 18px; text-transform: uppercase; font-weight: 900;" onclick="startGame()">BẮT ĐẦU CHƠI</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
